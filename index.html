<!DOCTYPE html>
<html lang="gl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>MisEducativos · Coruña Labs</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.css" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.js"></script>
<style>
  /* ===== Coruña Labs shared design tokens — extracted from Bus Works ===== */
  :root{
    --ink:#16181a;--muted:#6b7177;--faint:#9aa0a6;--hairline:#e2e3e5;
    --paper:#fbfbfa;--panel:#ffffff;--rest:#b4b8bc;
    --error:#a50813;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:"Inter","Helvetica Neue",Arial,system-ui,sans-serif;color:var(--ink);
    background:var(--paper);-webkit-font-smoothing:antialiased;overflow:hidden}
  #map{position:absolute;inset:0}

  /* ---------- Masthead: gradient bleed, flush top-left, no card/shadow ---------- */
  .masthead{position:absolute;top:0;left:0;z-index:5;padding:20px 22px 26px;width:360px;max-width:92vw;
    background:linear-gradient(180deg,rgba(251,251,250,.96),rgba(251,251,250,.7) 75%,rgba(251,251,250,0))}
  .masthead .top{display:flex;align-items:baseline;justify-content:space-between;gap:16px;pointer-events:none}
  .lab{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
    font-weight:600;margin:0 0 7px;display:flex;align-items:center;gap:7px}
  .lab a{color:inherit;text-decoration:none;pointer-events:auto}
  .lab a:hover{color:var(--ink)}
  .masthead h1{font-size:23px;line-height:1.12;margin:0;font-weight:660;letter-spacing:-.015em}
  .masthead p.sub{font-size:12.5px;line-height:1.5;color:var(--muted);margin:9px 0 0;max-width:320px;pointer-events:none}
  .masthead p.note{font-size:11.5px;color:var(--faint);margin:7px 0 0;font-style:italic;pointer-events:none}

  .langs{pointer-events:auto;display:flex;gap:2px;flex:0 0 auto;margin-top:2px}
  .langs button{background:none;border:none;font:inherit;font-size:11px;font-weight:600;
    letter-spacing:.04em;color:var(--faint);cursor:pointer;padding:3px 6px;border-radius:5px;
    text-transform:uppercase}
  .langs button:hover{color:var(--muted);background:rgba(0,0,0,.04)}
  .langs button.on{color:var(--ink);background:rgba(0,0,0,.06)}

  /* ---------- Search bar: inline connected bar (city segment + address segment) ---------- */
  .searchbar{pointer-events:auto;margin-top:13px;display:flex;align-items:stretch;
    background:var(--panel);border:1px solid var(--hairline);border-radius:10px;
    box-shadow:0 1px 2px rgba(0,0,0,.04),0 8px 22px rgba(0,0,0,.06);overflow:visible;position:relative}
  .seg-city{display:flex;align-items:center;gap:5px;padding:9px 11px;font:inherit;font-size:12.5px;
    font-weight:600;color:var(--ink);background:none;border:none;border-right:1px solid var(--hairline);
    white-space:nowrap;cursor:pointer;border-radius:10px 0 0 10px;max-width:150px;overflow:hidden}
  .seg-city.placeholder{color:var(--faint);font-weight:500}
  .seg-city span.label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .seg-city .chev{font-size:9px;color:var(--faint);flex:0 0 auto;transition:transform .15s}
  .seg-city.open .chev{transform:rotate(180deg)}
  .seg-city:hover{background:rgba(0,0,0,.03)}
  .seg-search{display:flex;align-items:center;gap:8px;padding:9px 12px;flex:1;min-width:0}
  .seg-search svg{flex:0 0 auto;color:var(--faint)}
  .seg-search input{border:none;outline:none;font:inherit;font-size:12.5px;color:var(--ink);
    background:none;flex:1;min-width:0}
  .seg-search input::placeholder{color:var(--faint)}
  .seg-clear{flex:0 0 auto;background:none;border:none;color:var(--faint);cursor:pointer;
    font-size:15px;line-height:1;padding:2px 4px;display:none}
  .seg-clear.show{display:block}
  .seg-clear:hover{color:var(--ink)}

  .city-menu{position:absolute;top:calc(100% + 8px);left:0;width:260px;max-height:340px;overflow-y:auto;
    z-index:10;background:var(--panel);border:1px solid var(--hairline);border-radius:12px;
    box-shadow:0 1px 2px rgba(0,0,0,.03),0 14px 34px rgba(0,0,0,.14);padding:7px;display:none}
  .city-menu.open{display:block}
  .city-menu .grp{padding:8px 10px 4px;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--faint);font-weight:700}
  .city-menu .opt{display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:7px 10px;border-radius:8px;font-size:12.5px;color:var(--muted);cursor:pointer}
  .city-menu .opt:hover{background:#f4f5f6;color:var(--ink)}
  .city-menu .opt.sel{background:#f0f1f2;color:var(--ink);font-weight:600}
  .city-menu .opt .count{font-size:10.5px;color:var(--faint);font-variant-numeric:tabular-nums}
  .city-menu .allopt{border-bottom:1px solid var(--hairline);margin-bottom:4px;padding-bottom:8px}

  /* ---------- Address autocomplete dropdown ---------- */
  .addr-menu{position:absolute;top:calc(100% + 8px);left:0;right:0;max-height:280px;overflow-y:auto;
    z-index:10;background:var(--panel);border:1px solid var(--hairline);border-radius:12px;
    box-shadow:0 1px 2px rgba(0,0,0,.03),0 14px 34px rgba(0,0,0,.14);padding:6px;display:none}
  .addr-menu.open{display:block}
  .addr-menu .opt{padding:8px 10px;border-radius:8px;font-size:12.5px;color:var(--muted);cursor:pointer}
  .addr-menu .opt:hover,.addr-menu .opt.hi{background:#f4f5f6;color:var(--ink)}

  /* ---------- City markers (DOM, not GL symbol layer — full type control) ---------- */
  .city-marker{pointer-events:auto;cursor:pointer;display:flex;flex-direction:column;align-items:center;
    gap:4px}
  .city-marker .dot{width:9px;height:9px;border-radius:50%;background:var(--panel);
    border:2px solid var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.25);transition:background .15s,transform .15s}
  .city-marker .tag{font-size:10.5px;font-weight:660;color:var(--ink);background:rgba(251,251,250,.92);
    padding:2px 7px;border-radius:5px;white-space:nowrap;box-shadow:0 1px 2px rgba(0,0,0,.08);
    transform:translateY(-1px);transition:opacity .2s}
  .city-marker:hover .dot{transform:scale(1.25)}
  .city-marker.active .dot{background:var(--ink)}
  .city-marker.active .tag{background:var(--ink);color:#fff}

  /* ---------- Callout: native MapLibre popup — direct polygon click ----------
     Sized down a step from the first draft -- at the original size it read as
     noticeably heavier than a rail row for the same information, which felt
     inconsistent given they're both just "here's a school and its tags." */
  .maplibregl-popup-content{font-family:inherit;border-radius:9px;padding:10px 12px;
    box-shadow:0 8px 28px rgba(0,0,0,.16);border:1px solid var(--hairline)}
  .pop-title{font-size:12px;font-weight:660;margin:0 0 2px}
  .pop-sub{font-size:10.5px;color:var(--muted);margin:0 0 5px;line-height:1.4}
  .pop-tags{display:flex;gap:4px;flex-wrap:wrap;margin:0 0 5px}
  .pop-tag{font-size:9.5px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;
    padding:2px 6px;border-radius:5px}
  .pop-link{font-size:10.5px;color:var(--ink);text-decoration:underline;text-underline-offset:2px}
  .pop-warn{color:var(--error);font-weight:600}

  /* ---------- Ensinanza tint pairs -- one light bg + one readable text
     color per type, shared by rail tags, the legend/toggle chips, and the
     popup tags (three places that used to be plain grey, now all the same
     "Airtable-style" filled chip). Same hue family as ENSINANZA_COLORS,
     just split into a pastel background and a darker, legible foreground
     instead of one mid-tone used as a small dot. ---------- */
  .ens-tag-22{background:#E3F0F8;color:#2E6E94}
  .ens-tag-25{background:#EFE9F7;color:#6B4E9E}
  .ens-tag-24{background:#E7F3EB;color:#3D7955}
  .ens-tag-29{background:#FBEFE1;color:#A8672A}

  /* ---------- Rail: permanent, always visible -- browse + filter surface ----------
     Retired the old slide-in docked panel in favor of this. The panel opened
     transiently for one city or one search result; the rail is always there
     and just filters its own contents, which is what let the legend move in
     as real toggle controls (see .legend-toggle below) instead of a passive
     floating key. */
  .rail{position:absolute;z-index:15;background:var(--panel);border:1px solid var(--hairline);
    box-shadow:0 1px 2px rgba(0,0,0,.03),0 10px 30px rgba(0,0,0,.07);
    display:flex;flex-direction:column;overflow:hidden}
  @media (min-width:720px){
    .rail{top:14px;right:14px;bottom:14px;width:300px;border-radius:12px}
  }
  @media (max-width:719px){
    .rail{left:0;right:0;bottom:0;height:40vh;border-radius:12px 12px 0 0}
  }
  .rail__legend-wrap{padding:12px 12px 10px;border-bottom:1px solid var(--hairline)}
  .rail__legend-hint{margin:0 0 6px;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--faint);font-weight:600}
  .rail__legend{display:flex;flex-wrap:wrap;gap:6px}
  /* .legend-toggle pairs with .pop-tag + .ens-tag-XX in the HTML -- same
     filled chip as the rail tags, just a real <button> with a hover/off
     state on top. Deliberately no size overrides here (padding, font)
     beyond what .pop-tag already sets -- the first draft gave these a
     bigger padding of their own, which made them read as a visibly
     different, chunkier control instead of the same chip repeated.
     Second gotcha found after fixing the padding: "font: inherit" is a
     shorthand that resets font-size/font-weight along with font-family --
     it was silently overriding .pop-tag's 9.5px/700 with the button's
     own inherited (body-level, 16px/400) font despite coming first in
     the cascade, since the shorthand touches those sub-properties too.
     font-family alone doesn't have that problem. */
  .legend-toggle{border:none;cursor:pointer;font-family:inherit;
    transition:opacity .15s,filter .15s}
  .legend-toggle:hover{filter:brightness(0.96)}
  .legend-toggle.off{opacity:.35}

  .rail__status{display:flex;align-items:baseline;justify-content:space-between;gap:8px;
    padding:10px 14px;border-bottom:1px solid var(--hairline)}
  .rail__status .count{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
  .rail__status .reset{font-size:10.5px;color:var(--faint);cursor:pointer;text-decoration:underline;
    text-underline-offset:2px;visibility:hidden;background:none;border:none;font-family:inherit;padding:0}
  .rail__status .reset.show{visibility:visible}
  .rail__status .reset:hover{color:var(--ink)}

  .rail__scroll{overflow-y:auto;flex:1;padding:6px}
  .rail__group{padding:9px 8px 4px;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--faint);font-weight:700}
  .rail__school{padding:7px 8px;border-radius:8px;cursor:pointer}
  .rail__school:hover{background:#f4f5f6}
  .rail__school.hi{background:#f0f1f2}
  .rail__school-body{min-width:0;flex:1}
  .rail__school-name{font-size:12px;font-weight:660;color:var(--ink);margin:0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rail__school-tags{display:flex;gap:3px;flex-wrap:wrap;margin:3px 0 0}
  .rail__empty{padding:20px 14px;font-size:12px;color:var(--faint);text-align:center}

  .rail__foot{padding:10px 14px;border-top:1px solid var(--hairline);font-size:10px;
    line-height:1.6;color:var(--faint)}
  .rail__foot a{color:var(--faint);text-decoration:underline;text-underline-offset:2px}
  .rail__foot a:hover{color:var(--muted)}

  /* ---------- Search-result pin (distinct from city markers) ----------
     Sized up from 13px -- at the original size it read as a bit timid for
     what's meant to be "here's the exact spot you searched for." */
  .result-pin{width:22px;height:22px;border-radius:50% 50% 50% 0;background:var(--ink);
    transform:rotate(-45deg);box-shadow:0 2px 6px rgba(0,0,0,.4);border:3px solid #fff}

  /* ---------- Toast ---------- */
  .toast{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:6;
    background:var(--panel);border:1px solid var(--hairline);border-radius:9px;padding:14px 18px;
    font-size:13px;color:var(--muted);box-shadow:0 8px 24px rgba(0,0,0,.08)}
  .toast.err{color:var(--error)}

  @media (max-width:640px){
    .masthead{width:100%;max-width:none}
    .maplibregl-ctrl-bottom-left{display:none}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div id="map"></div>

<div class="masthead">
  <div class="top">
    <div>
      <p class="lab"><a href="https://corunalabs.org">Coruña Labs</a></p>
      <h1 id="m-title">MisEducativos</h1>
    </div>
    <div class="langs" id="langs">
      <button data-lang="gl">GL</button><button data-lang="es">ES</button><button data-lang="en">EN</button>
    </div>
  </div>
  <p class="sub" id="m-sub"></p>
  <p class="sub note" id="m-note"></p>

  <div class="searchbar">
    <button class="seg-city placeholder" id="city-trigger" aria-haspopup="listbox" aria-expanded="false">
      <span class="label" id="city-trigger-label">Toda Galicia</span><span class="chev">▾</span>
    </button>
    <div class="seg-search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.6" y2="16.6"/></svg>
      <input type="text" id="addr-input" autocomplete="off" />
      <button class="seg-clear" id="addr-clear" aria-label="×">&times;</button>
    </div>
    <div class="city-menu" id="city-menu" role="listbox"></div>
    <div class="addr-menu" id="addr-menu" role="listbox"></div>
  </div>
</div>

<aside class="rail" aria-label="Centros">
  <div class="rail__legend-wrap">
    <p class="rail__legend-hint" id="rail-legend-hint"></p>
    <div class="rail__legend" id="rail-legend"></div>
  </div>
  <div class="rail__status">
    <span class="count" id="rail-count"></span>
    <button class="reset" id="rail-reset"></button>
  </div>
  <div class="rail__scroll" id="rail-list"></div>
  <div class="rail__foot" id="rail-foot"></div>
</aside>

<div class="toast" id="toast"></div>

<script>
/* ==========================================================================
   MisEducativos — Coruña Labs
   Built from map-template. The rail is permanent -- not the optional,
   collapsible thing the template treats it as -- because it's the primary
   browse/filter surface here: city select, address search, and the
   ensinanza-type toggles all narrow the same always-visible list rather
   than opening a separate transient panel (an earlier draft had one; see
   project discussion for why it got retired in favor of this).
   ========================================================================== */

/* ---------- TOOL-SPECIFIC: strings ---------- */
const I18N = {
  gl:{ title:"MisEducativos", sub:"Áreas de influencia dos centros educativos de Galicia.",
       note:"Dispoñible en 11 concellos, por agora.",
       loading:"Cargando…", error:"Non se puideron cargar os datos.",
       allCities:"Todas as zonas", searchPlaceholder:"Busca un enderezo…",
       notCovered:(loc)=>`${loc} aínda non está cuberto — por agora só nestes 11 concellos.`,
       noMatch:"Non se atopou ese enderezo.",
       officialLink:"Ver ficha oficial",
       railCountAll:(n)=>`${n} centros en Galicia`,
       railCountCity:(n,city)=>`${n} centro${n===1?"":"s"} en ${city}`,
       railCountSearch:(n)=>`${n} resultado${n===1?"":"s"}`,
       railEmpty:"Ningún centro coincide coa selección.",
       railReset:"Ver todos", railBack:"← Volver",
       legendHint:"Filtrar por tipo",
       railFoot:'Datos: <a href="https://www.edu.xunta.gal/centroseducativos/" target="_blank" rel="noopener">Xunta de Galicia — Centros educativos</a> (fonte oficial)<br><a href="https://github.com/Coruna-Labs/mis-educativos" target="_blank" rel="noopener">Código fonte ↗</a>',
       ensinanzaNames:{"22":"Infantil","25":"Primaria","24":"ESO","29":"Bacharelato"} },
  es:{ title:"MisEducativos", sub:"Áreas de influencia de los centros educativos de Galicia.",
       note:"Disponible en 11 concellos, por ahora.",
       loading:"Cargando…", error:"No se pudieron cargar los datos.",
       allCities:"Todas las zonas", searchPlaceholder:"Busca una dirección…",
       notCovered:(loc)=>`${loc} aún no está cubierto — por ahora solo en estos 11 concellos.`,
       noMatch:"No se encontró esa dirección.",
       officialLink:"Ver ficha oficial",
       railCountAll:(n)=>`${n} centros en Galicia`,
       railCountCity:(n,city)=>`${n} centro${n===1?"":"s"} en ${city}`,
       railCountSearch:(n)=>`${n} resultado${n===1?"":"s"}`,
       railEmpty:"Ningún centro coincide con la selección.",
       railReset:"Ver todos", railBack:"← Volver",
       legendHint:"Filtrar por tipo",
       railFoot:'Datos: <a href="https://www.edu.xunta.gal/centroseducativos/" target="_blank" rel="noopener">Xunta de Galicia — Centros educativos</a> (fuente oficial)<br><a href="https://github.com/Coruna-Labs/mis-educativos" target="_blank" rel="noopener">Código fuente ↗</a>',
       ensinanzaNames:{"22":"Infantil","25":"Primaria","24":"ESO","29":"Bachillerato"} },
  en:{ title:"MisEducativos", sub:"School catchment zones across Galicia.",
       note:"Available in 11 concellos, for now.",
       loading:"Loading…", error:"Couldn't load the data.",
       allCities:"All zones", searchPlaceholder:"Search an address…",
       notCovered:(loc)=>`${loc} isn't covered yet — only these 11 concellos, for now.`,
       noMatch:"Couldn't find that address.",
       officialLink:"View official page",
       railCountAll:(n)=>`${n} schools in Galicia`,
       railCountCity:(n,city)=>`${n} school${n===1?"":"s"} in ${city}`,
       railCountSearch:(n)=>`${n} result${n===1?"":"s"}`,
       railEmpty:"No school matches this selection.",
       railReset:"See all", railBack:"← Back",
       legendHint:"Filter by type",
       railFoot:'Data: <a href="https://www.edu.xunta.gal/centroseducativos/" target="_blank" rel="noopener">Xunta de Galicia — Centros educativos</a> (official source)<br><a href="https://github.com/Coruna-Labs/mis-educativos" target="_blank" rel="noopener">Source code ↗</a>',
       ensinanzaNames:{"22":"Infantil","25":"Primary","24":"ESO","29":"Bacharelato"} },
};

// Ensinanza color key, reused for the catchment fill layer and the legend.
// Priority order for a feature covering more than one level (see
// dominant_ensinanza_codigo in the data pipeline): infantil, primaria,
// eso, bacharelato -- earliest stage wins.
const ENSINANZA_COLORS = {
  "22": "#4F9FCE", // infantil — blue
  "25": "#9B7FC7", // primaria — purple
  "24": "#5FAE7B", // eso — green
  "29": "#D9954E", // bacharelato — amber
};
const LANGS = ["gl","es","en"];
const STORAGE_KEY = "miseducativos.lang";

/* ---------- SHARED: language via ?lang= + localStorage ---------- */
const params = new URLSearchParams(location.search);
function initialLang(){
  const u = params.get("lang");
  if(u && LANGS.includes(u)) return u;
  try{ const s = localStorage.getItem(STORAGE_KEY); if(s && LANGS.includes(s)) return s; }catch(e){}
  return "gl";
}
let lang = initialLang();

function syncURL(extra){
  const p = new URLSearchParams();
  if(lang && lang!=="gl") p.set("lang",lang);
  if(extra) for(const [k,v] of Object.entries(extra)) if(v) p.set(k,v);
  const qs = p.toString();
  history.replaceState(null,"", qs ? `?${qs}` : location.pathname);
}

const toast=document.getElementById("toast");
const showToast=(m,e)=>{toast.style.display="block";toast.textContent=m;toast.classList.toggle("err",!!e)};
const hideToast=()=>toast.style.display="none";

function applyText(){
  const t = I18N[lang];
  document.documentElement.lang = lang;
  document.getElementById("m-title").textContent = t.title;
  document.getElementById("m-sub").textContent = t.sub;
  document.getElementById("m-note").textContent = t.note || "";
  document.getElementById("addr-input").placeholder = t.searchPlaceholder;
  document.getElementById("rail-legend-hint").textContent = t.legendHint;
  document.getElementById("rail-foot").innerHTML = t.railFoot;
  document.querySelectorAll(".langs button").forEach(b=>b.classList.toggle("on",b.dataset.lang===lang));
  if(toast.style.display==="block" && !toast.classList.contains("err")) toast.textContent=t.loading;
  renderCityTrigger();
  renderCityMenu();
  renderRailLegend();
  renderRail();
}
// Called once state/rail-related data (declared further below) exist --
// see bottom of this script, right after their declarations, not here.

document.getElementById("langs").addEventListener("click",(e)=>{
  const b=e.target.closest("button"); if(!b) return;
  lang=b.dataset.lang;
  try{ localStorage.setItem(STORAGE_KEY,lang); }catch(err){}
  applyText(); syncURL();
});

/* ---------- SHARED: map init ---------- */
const BASEMAP = "https://basemaps.cartocdn.com/gl/positron-gl-style/style.json";

// Galicia-wide, generously padded per project direction.
const SERVICE_AREA = { north:44.4622, south:41.2952, east:-6.0111, west:-10.0983 };
const MAX_BOUNDS = [[SERVICE_AREA.west,SERVICE_AREA.south],[SERVICE_AREA.east,SERVICE_AREA.north]];
const GALICIA_CENTER = [
  (SERVICE_AREA.east + SERVICE_AREA.west) / 2,
  (SERVICE_AREA.north + SERVICE_AREA.south) / 2,
];

const map = new maplibregl.Map({
  container:"map", style:BASEMAP,
  center: GALICIA_CENTER, zoom: 7.1,
  maxBounds: MAX_BOUNDS,
  minZoom: 6.6,
  attributionControl:false, dragRotate:false, pitchWithRotate:false
});
map.touchZoomRotate.disableRotation();
map.addControl(new maplibregl.NavigationControl({showCompass:false}),"bottom-left");
new ResizeObserver(() => map.resize()).observe(document.getElementById("map"));

/* ---------- TOOL-SPECIFIC: state ---------- */
const state = {
  selectedCity: null,       // concello_codigo or null ("Todas as zonas")
  catchments: null,         // parsed GeoJSON, kept in memory for rail rendering + hit-testing
  cityMarkersData: null,    // parsed city_markers.geojson
  cityGroups: [],           // [{provincia_nome, cities:[{concello_codigo, concello_nome, school_count}]}]
  markerEls: {},            // concello_codigo -> {marker, el}
  resultMarker: null,
  resultPopup: null,
  allSchools: [],           // built once from state.catchments -- one row per school (deduped
                            // across its 1-2 catchment features), for the rail
  activeEnsinanzas: new Set(["22","25","24","29"]), // all on by default; the legend toggles these
  searchMatchCodigos: null, // Set of school codigos from the last resolved search, or null
  previousMatch: null,      // {codigos, city} snapshot to restore via "back" when a rail-row
                            // click narrows further from a broader city/search context
};

/* ---------- catchment paint expressions: category color x zoom x selection ---------- */
// Zoom-based crossfade with the overview markers (see updateMarkerOpacity):
// polygons are the wrong thing to look at zoomed all the way out -- 400+
// tiny shapes compress into a handful of dark smudges, which is exactly
// the "just overlaying all the polygons" problem the markers exist to
// solve instead. So the fill/line stay at zero opacity below zoom 9 and
// ramp in by 10.5, roughly as the markers' text labels fade out.
//
// MapLibre requires a "zoom" expression to be the direct, top-level input
// of an interpolate/step -- it can't be nested inside another operator
// like "*" (tried that first; addLayer rejected it at runtime). The
// supported way to combine a zoom ramp with a data-driven value is to put
// the data expression directly in the interpolate's stop output instead.
//
// FILL stays faint everywhere except the selected city: dense areas
// (central Vigo especially) can have a dozen-plus overlapping catchments
// in different ensinanza colors, and translucent overlapping fills of
// *different* hues don't compound cleanly like the old monochrome version
// did -- they blend into a muddy olive/brown smear. Found this by testing
// in-browser, not guessed. LINE stays meaningfully visible always, since
// a colored outline reads fine even stacked a dozen deep -- that's what
// actually carries the category signal while browsing; fill lighting up
// is reserved for "here's the one city you're looking at."
//
// A school offering more than one ensinanza used to get exactly one fill
// color, picked by a fixed priority -- which meant Bacharelato (almost
// always paired with ESO) was buried under the ESO color for 55 of 57
// schools that actually offer it. Fixed by dropping the single-color-per-
// polygon idea entirely: fill goes neutral (just area wash), and each
// ensinanza type gets its own thin ring outline, offset outward from the
// others so a multi-type school shows multiple distinct rings instead of
// one color winning. See RING_OFFSETS below.
//
// Which condition decides "highlighted vs faint": a resolved search wins
// over a plain city selection, matching the rail (narrowest filter shows).
// A search match is per-school (codigo); a city selection is per-concello.
function highlightCondition(){
  if(state.searchMatchCodigos && state.searchMatchCodigos.size){
    return ["in", ["get","codigo"], ["literal", [...state.searchMatchCodigos]]];
  }
  const sel = state.selectedCity || "__none__";
  return ["==", ["get","concello_codigo"], sel];
}
// A specific search match is usually one school, occasionally a handful
// at a dense boundary -- can afford a strong highlight. A whole selected
// CITY can be 100+ overlapping shapes (Vigo especially), and the same
// strong opacity there compounds right back into the solid-black problem
// this whole ring/neutral-fill redesign was built to avoid. So the
// highlighted fill-opacity depends on which one is actually active.
function highlightFillOpacity(){
  // A whole-city selection can span 100+ overlapping shapes (Vigo); any
  // non-zero fill boost there compounds straight back to a black screen
  // (verified: 0.25 across 11 overlaps compounds to ~96%). So a plain
  // city selection doesn't touch fill-opacity at all -- it relies
  // entirely on the ring outlines, which don't compound into a filled
  // block the same way.
  if(!(state.searchMatchCodigos && state.searchMatchCodigos.size)) return 0.05;

  // A search match isn't reliably small either -- assumed "usually one,
  // rarely more than a handful" here first, then found a real address
  // (dense Vigo) that matches 15-16 schools every time, which at a flat
  // 0.42 also compounds to ~100%. Instead of guessing another constant,
  // solve backwards from a target *compounded* opacity: per-layer
  // opacity o across n stacked layers compounds to 1-(1-o)^n, so
  // o = 1-(1-target)^(1/n) hits that target regardless of how many
  // schools happen to match. n=1 (the common case) still gets a strong
  // ~0.35; n=15 gets a much gentler per-layer value that still lands
  // near the same visual target where they overlap.
  const n = state.searchMatchCodigos.size;
  const target = 0.35;
  return 1 - Math.pow(1 - target, 1 / n);
}
// The "not matched" baseline also depends on why something isn't
// matched: plain browsing (nothing selected) wants everything at a
// gentle, even baseline; an active address search wants the non-matches
// to recede further, since the whole point of searching is "show me
// what's relevant here" -- a search result that's only slightly more
// prominent than everything else undersells the answer.
function faintFillOpacity(){
  return (state.searchMatchCodigos && state.searchMatchCodigos.size) ? 0.02 : 0.05;
}
function faintLineOpacity(){
  return (state.searchMatchCodigos && state.searchMatchCodigos.size) ? 0.2 : 0.65;
}
function fillOpacityExpr(){
  const byMatch = ["case", highlightCondition(), highlightFillOpacity(), faintFillOpacity()];
  return ["interpolate", ["linear"], ["zoom"], 9, 0, 10.5, byMatch];
}
function lineOpacityExpr(){
  const byMatch = ["case", highlightCondition(), 1, faintLineOpacity()];
  return ["interpolate", ["linear"], ["zoom"], 9, 0, 10.5, byMatch];
}
function lineWidthExpr(){
  // Unselected width bumped up from the original 0.6 -- the outline is
  // now the primary way to read the category color while browsing (see
  // fillOpacityExpr above), so it needs to actually be legible on its own.
  // Highlighted width bumped further (was 1.8) for the same reason as
  // fill-opacity above -- more visual separation from the resting state.
  return ["case", highlightCondition(), 2.6, 1.0];
}
// Small, fixed per-pixel offsets so the 4 type rings sit concentrically
// rather than drawing on top of each other.
const RING_OFFSETS = { "22": 0, "25": 1.6, "24": 3.2, "29": 4.8 };

// __fid-based filters (see buildFeatureIndex) rather than a MapLibre
// property expression on "ensinanzas" -- that property is an array of
// objects, and we already got burned once by MapLibre stringifying
// non-primitive properties for tile-backed sources (see parseEnsinanzas).
// __fid is a plain number we assign ourselves, so filtering by it is safe
// regardless of how MapLibre internally encodes the richer properties.
function fillFilterExpr(){
  const visible = new Set();
  for(const f of state.catchments.features){
    if(f.properties.ensinanzas.some(e=>state.activeEnsinanzas.has(e.codigo))){
      visible.add(f.properties.__fid);
    }
  }
  return ["in", ["get","__fid"], ["literal", [...visible]]];
}
// Each ring layer's filter is fixed at creation (which features offer
// this type at all); toggling that type on/off just flips the whole
// layer's visibility instead of recomputing a filter.
function ringFilterExpr(code){
  const fids = state.catchments.features
    .filter(f=>f.properties.ensinanzas.some(e=>e.codigo===code))
    .map(f=>f.properties.__fid);
  return ["in", ["get","__fid"], ["literal", fids]];
}

/* ---------- TOOL-SPECIFIC: data + layers ---------- */
// Guard against both (a) the style having already finished loading before
// this listener attaches, and (b) "load" just not firing reliably in some
// automated/headless browser contexts observed during dev — poll as a
// backstop alongside the event, whichever comes first wins, guarded so
// the callback only ever runs once.
function whenStyleReady(cb){
  let done = false;
  function fire(){ if(done) return; done = true; cb(); }
  if(map.isStyleLoaded()){ fire(); return; }
  map.once("load", fire);
  const poll = setInterval(() => {
    if(map.isStyleLoaded()){ clearInterval(poll); fire(); }
  }, 200);
}
whenStyleReady(async () => {
  try{
    const [catchments, cityMarkers] = await Promise.all([
      fetch("data/catchments_galicia.geojson").then(r=>{if(!r.ok)throw new Error("catchments");return r.json();}),
      fetch("data/city_markers.geojson").then(r=>{if(!r.ok)throw new Error("markers");return r.json();}),
    ]);
    // Plain numeric id per feature, assigned once here -- lets filter
    // expressions target exact catchment shapes safely (a school can be
    // 1-2 shapes; "codigo" alone isn't precise enough for the per-type
    // ring filters below, which need feature-, not school-, granularity).
    catchments.features.forEach((f,i) => { f.properties.__fid = i; });

    state.catchments = catchments;
    state.cityMarkersData = cityMarkers;

    // Positron draws building fills after roads, so they can't be kept
    // under our translucent layer via beforeId — hide them outright,
    // same call adrh-mapper made (buildings just clutter a data layer).
    ["building","building-top"].forEach(id=>{
      if(map.getLayer(id)) map.setLayoutProperty(id,"visibility","none");
    });

    // No beforeId here on purpose -- catchments render on top of the
    // basemap's own roads/labels like a normal data layer. An earlier
    // draft kept roads above the fill (the technique adrh-mapper uses),
    // but that read as unnecessary fuss for this tool.
    map.addSource("catchments", {type:"geojson", data:catchments});
    map.addLayer({
      id:"catchments-fill", type:"fill", source:"catchments",
      filter: fillFilterExpr(),
      paint:{
        "fill-color": "#16181a",
        "fill-opacity": fillOpacityExpr(),
      },
    });
    // One ring layer per ensinanza type instead of a single colored line
    // -- see the big comment above highlightCondition() for why. Each
    // layer's filter is fixed (which shapes offer this type, full stop);
    // the toggle just flips the whole layer's visibility.
    for(const code of ENSINANZA_PRIORITY){
      map.addLayer({
        id:`catchments-ring-${code}`, type:"line", source:"catchments",
        filter: ringFilterExpr(code),
        layout:{ visibility: state.activeEnsinanzas.has(code) ? "visible" : "none" },
        paint:{
          "line-color": ENSINANZA_COLORS[code],
          "line-width": lineWidthExpr(),
          "line-opacity": lineOpacityExpr(),
          "line-offset": RING_OFFSETS[code],
        },
      });
    }
    // Invisible, unfiltered twin of catchments-fill, queried only by
    // address search's hit-test -- found a real bug where searching an
    // address whose only covering school had its dominant ensinanza
    // toggled off would report "not covered" even though it genuinely is
    // covered, just hidden from view. Search answers "is this address
    // covered," which has to stay true regardless of what's currently
    // toggled for browsing.
    map.addLayer({
      id:"catchments-hittest", type:"fill", source:"catchments",
      paint:{ "fill-opacity": 0 },
    });

    map.on("click","catchments-fill",(e)=>{
      const f = e.features[0];
      openSchoolPopup(e.lngLat, [f]);
    });
    map.on("mouseenter","catchments-fill",()=>map.getCanvas().style.cursor="pointer");
    map.on("mouseleave","catchments-fill",()=>map.getCanvas().style.cursor="");

    buildCityGroups();
    buildSchoolIndex();
    renderCityMenu();
    renderCityMarkers();
    updateCatchmentHighlight();
    renderRailLegend();
    renderRail();

    hideToast();
  }catch(e){
    showToast(I18N[lang].error,true);
    console.error(e);
  }
});

// Fixed display order for the 4 ensinanza types -- used for the ring
// offsets, the legend, and each school's chip order. Not a "dominant type"
// priority anymore (that idea is what this whole redesign moved away
// from); just a consistent order to render things in.
const ENSINANZA_PRIORITY = ["22","25","24","29"];

// One row per school (a school can be 1-2 catchment features -- see the
// multi-geometry note in 04_dedupe_reproject.py -- but the rail shows one
// row per school, not per feature). Built once from the real parsed
// GeoJSON in memory, not from queryRenderedFeatures, so no stringified-
// property gotcha here (see parseEnsinanzas further down for that).
function buildSchoolIndex(){
  const byCode = new Map();
  for(const f of state.catchments.features){
    const p = f.properties;
    if(!byCode.has(p.codigo)){
      byCode.set(p.codigo, {
        codigo:p.codigo, nome:p.nome, detail_url:p.detail_url,
        concello_codigo:p.concello_codigo, concello_nome:p.concello_nome,
        ensinanzaCodes:new Set(),
      });
    }
    const entry = byCode.get(p.codigo);
    for(const e of p.ensinanzas) entry.ensinanzaCodes.add(e.codigo);
  }
  state.allSchools = [...byCode.values()].sort((a,b)=>a.nome.localeCompare(b.nome));
}

function buildCityGroups(){
  const byProvincia = new Map();
  for(const f of state.cityMarkersData.features){
    const p = f.properties;
    if(!byProvincia.has(p.provincia_nome)) byProvincia.set(p.provincia_nome, []);
    byProvincia.get(p.provincia_nome).push(p);
  }
  state.cityGroups = [...byProvincia.entries()]
    .sort((a,b)=>a[0].localeCompare(b[0]))
    .map(([provincia_nome, cities]) => ({
      provincia_nome,
      cities: cities.sort((a,b)=>a.concello_nome.localeCompare(b.concello_nome)),
    }));
}

/* ---------- rail: legend (now also the ensinanza-type toggles) ---------- */
const railLegendEl = document.getElementById("rail-legend");
function renderRailLegend(){
  const t = I18N[lang];
  railLegendEl.innerHTML = ENSINANZA_PRIORITY.map(code => `
    <button class="legend-toggle pop-tag ens-tag-${code}${state.activeEnsinanzas.has(code)?"":" off"}" data-code="${code}">
      ${t.ensinanzaNames[code]}
    </button>`).join("");
}
railLegendEl.addEventListener("click",(e)=>{
  const btn = e.target.closest(".legend-toggle"); if(!btn) return;
  const code = btn.dataset.code;
  if(state.activeEnsinanzas.has(code)) state.activeEnsinanzas.delete(code);
  else state.activeEnsinanzas.add(code);
  renderRailLegend();
  renderRail();
  updateEnsinanzaFilter();
});

/* ---------- rail: the list itself --------
   Narrowest filter wins, same priority as the map's highlightCondition:
   a resolved search > a selected city > everything, grouped by city. The
   ensinanza toggle applies on top of whichever of those is active. */
const railListEl = document.getElementById("rail-list");
const railCountEl = document.getElementById("rail-count");
const railResetEl = document.getElementById("rail-reset");

function visibleSchools(){
  // "Offers any currently active type," matching the map's fillFilterExpr
  // -- not "its one dominant type is active," which is the old single-
  // color-per-school idea this whole redesign moved away from.
  return state.allSchools.filter(s => [...s.ensinanzaCodes].some(c => state.activeEnsinanzas.has(c)));
}

function renderRail(){
  const t = I18N[lang];
  // applyText() runs once before the data fetch resolves (see bottom of
  // this script) -- without this guard the rail would flash "no school
  // matches" during that brief window instead of just staying blank while
  // the loading toast is up.
  if(!state.catchments){ railListEl.innerHTML = ""; railCountEl.textContent = ""; return; }
  let countText, showReset = false;

  // A resolved search shows its match(es) regardless of the ensinanza
  // toggle -- same reasoning as the hittest layer above. Toggling off a
  // type is a browsing preference; it shouldn't make a genuinely covered
  // address look uncovered just because its school's type is hidden.
  let schools;
  if(state.searchMatchCodigos && state.searchMatchCodigos.size){
    schools = state.allSchools.filter(s => state.searchMatchCodigos.has(s.codigo));
    countText = t.railCountSearch(schools.length);
    showReset = true;
  } else if(state.selectedCity){
    schools = visibleSchools();
    schools = schools.filter(s => s.concello_codigo === state.selectedCity);
    const cityName = state.cityMarkersData.features
      .find(f=>f.properties.concello_codigo===state.selectedCity)?.properties.concello_nome || "";
    countText = t.railCountCity(schools.length, cityName);
    showReset = true;
  } else {
    schools = visibleSchools();
    countText = t.railCountAll(schools.length);
  }

  railCountEl.textContent = countText;
  // "Back" when there's a broader context to return to (drilled into one
  // school from a city list or a multi-result search); plain full reset
  // otherwise -- see captureBackTarget/goBack.
  railResetEl.textContent = state.previousMatch ? t.railBack : t.railReset;
  railResetEl.classList.toggle("show", showReset);

  if(!schools.length){
    railListEl.innerHTML = `<p class="rail__empty">${t.railEmpty}</p>`;
    return;
  }

  // Grouped by city only in the fully-resting state -- once a city or a
  // search has narrowed things, every row already shares that context, so
  // a repeated group header would just be noise.
  const grouped = !state.selectedCity && !(state.searchMatchCodigos && state.searchMatchCodigos.size);
  if(!grouped){
    railListEl.innerHTML = schools.map(schoolRowHTML).join("");
    return;
  }
  const byCity = new Map();
  for(const s of schools){
    if(!byCity.has(s.concello_nome)) byCity.set(s.concello_nome, []);
    byCity.get(s.concello_nome).push(s);
  }
  const cityNames = [...byCity.keys()].sort((a,b)=>a.localeCompare(b));
  railListEl.innerHTML = cityNames.map(city => `
    <div class="rail__group">${city}</div>
    ${byCity.get(city).map(schoolRowHTML).join("")}
  `).join("");
}

function schoolRowHTML(s){
  const t = I18N[lang];
  // One colored tag per ensinanza offered, in the fixed priority order,
  // not one dominant color -- same reasoning as the map's ring outlines:
  // a school offering ESO+Bacharelato should visibly have both, not just
  // whichever one a priority order happened to pick. The tag color itself
  // now carries the category (see .ens-tag-XX), so there's no need for a
  // separate row of plain swatches alongside plain-grey text anymore.
  const codes = ENSINANZA_PRIORITY.filter(c => s.ensinanzaCodes.has(c));
  const tags = codes.map(c => `<span class="pop-tag ens-tag-${c}">${t.ensinanzaNames[c]}</span>`).join("");
  return `<div class="rail__school" data-codigo="${s.codigo}">
    <p class="rail__school-name">${s.nome}</p>
    <div class="rail__school-tags">${tags}</div>
  </div>`;
}

// If the rail is currently showing something broader than one school (a
// city's full list, or a multi-result search), remember it before a row
// click narrows further -- otherwise "back" would have nowhere to return
// to except the full 346-school reset, which is what this whole thing is
// meant to avoid re-typing an address for.
function captureBackTarget(){
  if(state.searchMatchCodigos && state.searchMatchCodigos.size > 1){
    return {codigos: new Set(state.searchMatchCodigos), city: state.selectedCity};
  }
  if(!state.searchMatchCodigos && state.selectedCity){
    return {codigos: null, city: state.selectedCity}; // null codigos = "whole city," not a search subset
  }
  return null; // resting state, or already narrowed to one -- nothing to go back to
}
function goBack(){
  if(!state.previousMatch){ closeEverything(); return; }
  const prev = state.previousMatch;
  state.previousMatch = null;
  clearResult();
  state.searchMatchCodigos = prev.codigos;
  selectCity(prev.city, {fromSearch: !!prev.codigos});
}

railListEl.addEventListener("click",(e)=>{
  const row = e.target.closest(".rail__school"); if(!row) return;
  const school = state.allSchools.find(s=>s.codigo===row.dataset.codigo);
  if(!school) return;
  state.previousMatch = captureBackTarget();
  // No clearResult() here -- this can run while drilling into one school
  // *from* an active address search, and the pin marks that original
  // searched point, which is still exactly relevant. clearResult() was
  // wiping it out even though no new search happened. A genuinely new
  // search already clears the old pin itself, in showSearchResult().
  state.searchMatchCodigos = new Set([school.codigo]);
  selectCity(school.concello_codigo, {fromSearch:true});
  const feat = state.catchments.features.find(f=>f.properties.codigo===school.codigo);
  if(feat){
    const ring = feat.geometry.type === "Polygon" ? feat.geometry.coordinates[0] : feat.geometry.coordinates[0][0];
    const lng = ring.reduce((s,c)=>s+c[0],0)/ring.length;
    const lat = ring.reduce((s,c)=>s+c[1],0)/ring.length;
    map.flyTo({center:[lng,lat], zoom:15.5, duration:900});
  }
});

railResetEl.addEventListener("click", goBack);

/* ---------- city markers (DOM, always on the map, fade out on deep zoom) ---------- */
function renderCityMarkers(){
  for(const f of state.cityMarkersData.features){
    const p = f.properties;
    const el = document.createElement("div");
    el.className = "city-marker";
    el.innerHTML = `<span class="tag">${p.concello_nome}</span><span class="dot"></span>`;
    el.addEventListener("click",(ev)=>{ ev.stopPropagation(); selectCity(p.concello_codigo); });
    const marker = new maplibregl.Marker({element:el, anchor:"bottom"})
      .setLngLat(f.geometry.coordinates)
      .addTo(map);
    state.markerEls[p.concello_codigo] = {marker, el};
  }
  updateMarkerOpacity();
  map.on("zoom", updateMarkerOpacity);
}
function updateMarkerOpacity(){
  const z = map.getZoom();
  // The dot itself never disappears -- a marker vanishing on zoom would
  // be its own kind of disorienting. Only the name label fades out, over
  // the same zoom range the catchment polygons fade in (9 -> 10.5), so
  // one becomes the useful thing on screen as the other stops being it.
  const labelOp = z <= 9 ? 1 : z >= 10.5 ? 0 : 1 - (z-9)/1.5;
  for(const {el} of Object.values(state.markerEls)){
    const tag = el.querySelector(".tag");
    tag.style.opacity = labelOp;
    tag.style.pointerEvents = labelOp < 0.05 ? "none" : "auto";
  }
}

/* ---------- city selection: shared state for markers + dropdown + search ---------- */
// {fromSearch}: a resolved search sets the city too (keeps the dropdown in
// sync, per the "these don't relate" concern from earlier -- turns out
// they should, a little), but it must NOT clear searchMatchCodigos, since
// that's the very narrowing the search just produced. An explicit user
// pick (marker click, dropdown choice) means "browse this city broadly,"
// so it clears any active search narrowing instead.
function selectCity(codigo, {fromSearch=false} = {}){
  state.selectedCity = codigo;
  // An explicit pick (marker/dropdown, not part of a search or a
  // rail-row drill-down) starts fresh -- any stale "back" target from a
  // previous drill-down no longer applies.
  if(!fromSearch){ state.searchMatchCodigos = null; state.previousMatch = null; }
  renderCityTrigger();
  updateCatchmentHighlight();
  for(const [c,{el}] of Object.entries(state.markerEls)){
    el.classList.toggle("active", c===codigo);
  }
  renderRail();
  syncURL({city: codigo || ""});

  // Fly to the city on an explicit pick (marker click or dropdown choice)
  // -- reverses an earlier "don't move the camera on city select" call;
  // turned out to feel more helpful than disorienting in practice. Only
  // for a real city pick, not fromSearch: a resolved address search and a
  // rail-row click already do their own, more precise flyTo to the exact
  // point/school, and flying twice would just fight itself.
  if(!fromSearch && codigo){
    const marker = state.cityMarkersData.features.find(f=>f.properties.concello_codigo===codigo);
    if(marker) map.flyTo({center: marker.geometry.coordinates, zoom: 12.5, duration: 900});
  }
}
function updateCatchmentHighlight(){
  if(!map.getLayer("catchments-fill")) return;
  map.setPaintProperty("catchments-fill","fill-opacity", fillOpacityExpr());
  for(const code of ENSINANZA_PRIORITY){
    map.setPaintProperty(`catchments-ring-${code}`,"line-opacity", lineOpacityExpr());
    map.setPaintProperty(`catchments-ring-${code}`,"line-width", lineWidthExpr());
  }
}
function updateEnsinanzaFilter(){
  if(!map.getLayer("catchments-fill")) return;
  map.setFilter("catchments-fill", fillFilterExpr());
  // Each ring's own filter (which shapes offer that type) never changes --
  // only whether the layer is shown at all does.
  for(const code of ENSINANZA_PRIORITY){
    map.setLayoutProperty(`catchments-ring-${code}`, "visibility",
      state.activeEnsinanzas.has(code) ? "visible" : "none");
  }
}

/* ---------- city trigger + dropdown ---------- */
const cityTrigger = document.getElementById("city-trigger");
const cityTriggerLabel = document.getElementById("city-trigger-label");
const cityMenu = document.getElementById("city-menu");

function renderCityTrigger(){
  const t = I18N[lang];
  if(!state.selectedCity){
    cityTrigger.classList.add("placeholder");
    cityTriggerLabel.textContent = t.allCities;
  } else {
    cityTrigger.classList.remove("placeholder");
    const f = state.cityMarkersData.features.find(f=>f.properties.concello_codigo===state.selectedCity);
    cityTriggerLabel.textContent = f ? f.properties.concello_nome : t.allCities;
  }
}
function renderCityMenu(){
  const t = I18N[lang];
  let html = `<div class="opt allopt${state.selectedCity?"":" sel"}" data-codigo="">${t.allCities}</div>`;
  for(const grp of state.cityGroups){
    html += `<div class="grp">${grp.provincia_nome}</div>`;
    for(const c of grp.cities){
      const sel = c.concello_codigo===state.selectedCity;
      html += `<div class="opt${sel?" sel":""}" data-codigo="${c.concello_codigo}">
        <span>${c.concello_nome}</span><span class="count">${c.school_count}</span></div>`;
    }
  }
  cityMenu.innerHTML = html;
}
function openCityMenu(){ cityMenu.classList.add("open"); cityTrigger.classList.add("open");
  cityTrigger.setAttribute("aria-expanded","true"); }
function closeCityMenu(){ cityMenu.classList.remove("open"); cityTrigger.classList.remove("open");
  cityTrigger.setAttribute("aria-expanded","false"); }

cityTrigger.addEventListener("click",(e)=>{
  e.stopPropagation();
  cityMenu.classList.contains("open") ? closeCityMenu() : openCityMenu();
});
cityMenu.addEventListener("click",(e)=>{
  const opt = e.target.closest(".opt"); if(!opt) return;
  const codigo = opt.dataset.codigo || null;
  selectCity(codigo);
  closeCityMenu();
});
document.addEventListener("click",(e)=>{
  if(!e.target.closest(".searchbar")) closeCityMenu();
});
document.addEventListener("keydown",(e)=>{ if(e.key==="Escape") closeCityMenu(); });

// Now that state/cityMenu/rail etc. all exist, do the first text pass and
// show the loading toast (map data itself arrives async in map.on("load")).
applyText();
showToast(I18N[lang].loading,false);

/* ---------- search: suggest-as-you-type, geocode, point-in-polygon ---------- */
// Same Xunta ArcGIS instance we already trust for the exact-match geocode
// -- confirmed it also exposes Suggest (capabilities: "Geocode,
// ReverseGeocode,Suggest") and CORS is open on that endpoint too, so this
// stays on infrastructure we've already verified rather than adding a
// second provider (Google needs a billed key and a backend to hide it;
// Nominatim's usage policy disallows autocomplete-style querying against
// its public instance) just for the suggestion dropdown.
const GEOCODER = "https://ideg2.xunta.gal/arcgis/rest/services/Geocoder/GeocodeServer/findAddressCandidates";
const SUGGEST = "https://ideg2.xunta.gal/arcgis/rest/services/Geocoder/GeocodeServer/suggest";
const addrInput = document.getElementById("addr-input");
const addrClear = document.getElementById("addr-clear");
const addrMenu = document.getElementById("addr-menu");

let suggestTimer = null;
let addrSuggestions = [];
let addrMenuIndex = -1;

addrInput.addEventListener("input",()=>{
  addrClear.classList.toggle("show", addrInput.value.length>0);
  scheduleSuggest(addrInput.value);
});
addrClear.addEventListener("click",()=>{
  addrInput.value=""; addrClear.classList.remove("show"); addrInput.focus();
  clearResult(); closeAddrMenu();
});
addrInput.addEventListener("keydown",(e)=>{
  if(addrMenu.classList.contains("open") && addrSuggestions.length){
    if(e.key==="ArrowDown"){ e.preventDefault(); addrMenuIndex=Math.min(addrMenuIndex+1,addrSuggestions.length-1); highlightAddrMenu(); return; }
    if(e.key==="ArrowUp"){ e.preventDefault(); addrMenuIndex=Math.max(addrMenuIndex-1,0); highlightAddrMenu(); return; }
    if(e.key==="Enter" && addrMenuIndex>=0){ e.preventDefault(); chooseSuggestion(addrMenuIndex); return; }
  }
  if(e.key==="Enter" && addrInput.value.trim()){ closeAddrMenu(); runSearch(addrInput.value.trim()); }
  if(e.key==="Escape") closeAddrMenu();
});

function scheduleSuggest(query){
  clearTimeout(suggestTimer);
  if(query.trim().length < 3){ closeAddrMenu(); return; }
  suggestTimer = setTimeout(()=>fetchSuggestions(query.trim()), 300);
}
async function fetchSuggestions(query){
  try{
    const url = `${SUGGEST}?f=pjson&text=${encodeURIComponent(query)}&Region=Galicia`;
    const res = await fetch(url);
    const json = await res.json();
    addrSuggestions = (json.suggestions || []).filter(s=>!s.isCollection).slice(0,6);
    renderAddrMenu();
  }catch(e){ console.error(e); }
}
function renderAddrMenu(){
  addrMenuIndex = -1;
  if(!addrSuggestions.length){ closeAddrMenu(); return; }
  addrMenu.innerHTML = addrSuggestions.map((s,i)=>`<div class="opt" data-i="${i}">${s.text}</div>`).join("");
  addrMenu.classList.add("open");
}
function highlightAddrMenu(){
  [...addrMenu.children].forEach((el,i)=>el.classList.toggle("hi", i===addrMenuIndex));
}
function closeAddrMenu(){ addrMenu.classList.remove("open"); addrSuggestions=[]; addrMenuIndex=-1; }
addrMenu.addEventListener("click",(e)=>{
  const opt = e.target.closest(".opt"); if(!opt) return;
  chooseSuggestion(+opt.dataset.i);
});
document.addEventListener("click",(e)=>{
  if(!e.target.closest(".searchbar")) closeAddrMenu();
});

async function chooseSuggestion(i){
  const s = addrSuggestions[i]; if(!s) return;
  addrInput.value = s.text;
  closeAddrMenu();
  const t = I18N[lang];
  showToast(t.loading, false);
  try{
    const url = `${GEOCODER}?f=pjson&magicKey=${encodeURIComponent(s.magicKey)}&outSR=4326`;
    const res = await fetch(url);
    const json = await res.json();
    hideToast();
    const cand = json.candidates && json.candidates[0];
    if(!cand){ showToast(t.noMatch, true); setTimeout(hideToast, 2600); return; }
    handleGeocodeResult(cand);
  }catch(e){
    hideToast(); showToast(t.error, true); console.error(e);
  }
}

function clearResult(){
  if(state.resultMarker){ state.resultMarker.remove(); state.resultMarker=null; }
  if(state.resultPopup){ state.resultPopup.remove(); state.resultPopup=null; }
}
function closeEverything(){ selectCity(null); clearResult(); }

async function runSearch(query){
  const t = I18N[lang];
  showToast(t.loading, false);
  try{
    const url = `${GEOCODER}?f=pjson&address=${encodeURIComponent(query)}&outSR=4326&Region=Galicia&maxLocations=1`;
    const res = await fetch(url);
    const json = await res.json();
    hideToast();
    const cand = json.candidates && json.candidates[0];
    if(!cand){ showToast(t.noMatch, true); setTimeout(hideToast, 2600); return; }
    handleGeocodeResult(cand);
  }catch(e){
    hideToast();
    showToast(t.error, true);
    console.error(e);
  }
}

function handleGeocodeResult(cand){
  const lngLat = [cand.location.x, cand.location.y];
  clearResult();
  map.flyTo({center:lngLat, zoom:15.5, duration:900});

  // Neither "moveend" nor "idle" proved reliable here for timing the
  // hit-test: "moveend" can fire before the newly-panned-to tiles finish
  // rendering (queryRenderedFeatures then misses features that are
  // clearly there moments later), and "idle" is edge-triggered on the
  // busy->idle transition, so it can fire immediately from the
  // *pre-existing* idle state before this flyTo's animation has even
  // started moving. A fixed delay past the flyTo duration sidesteps
  // both races and is imperceptible for a search action.
  setTimeout(() => {
    const hits = map.queryRenderedFeatures(map.project(lngLat), {layers:["catchments-hittest"]});
    showSearchResult(lngLat, hits, cand.address);
  }, 1100);
}

// Geocoder address strings look like "Rua X 22, 36213, Vigo, Pontevedra,
// Galicia" (with postal code) or sometimes just "Ourense, Orense, Galicia"
// (city-level fallback, no street/postal at all) -- a fixed split index
// picks the postal code in the first shape. Filter out anything numeric
// (postal codes) and the trailing "Galicia"/province instead, so this
// works for both shapes.
function extractLocality(addr){
  const parts = addr.split(",").map(s=>s.trim()).filter(Boolean);
  const filtered = parts.filter(p => !/^\d+$/.test(p) && p !== "Galicia");
  if(filtered.length > 1) filtered.pop(); // drop trailing province name
  return filtered[filtered.length-1] || addr;
}

function makeResultPinEl(){
  const el = document.createElement("div");
  el.className = "result-pin";
  return el;
}

// MapLibre stringifies non-primitive GeoJSON properties (arrays/objects)
// for features that come back from queryRenderedFeatures/click events --
// vector tiles have no native way to hold nested structures, so
// "ensinanzas" arrives as a JSON string there, not the real array it is
// on state.catchments.features (which the rail reads directly, no tiling
// involved). Found this the hard way: openSchoolPopup throws without it.
function parseEnsinanzas(raw){
  return typeof raw === "string" ? JSON.parse(raw) : raw;
}

// A resolved search narrows the rail + map to the matched school(s) --
// same surface as everything else now, not a separate panel. The popup
// stays reserved for the honest "not covered" message, a short note tied
// to a point on the map rather than a browsable result.
function showSearchResult(lngLat, hits, resolvedAddress){
  clearResult();
  // A brand-new search starts fresh -- any "back" target left over from
  // an earlier drill-down no longer applies to this result.
  state.previousMatch = null;
  state.resultMarker = new maplibregl.Marker({element:makeResultPinEl(), anchor:"bottom"})
    .setLngLat(lngLat).addTo(map);

  if(!hits.length){
    const t = I18N[lang];
    const html = `<p class="pop-title pop-warn">${t.notCovered(extractLocality(resolvedAddress))}</p>`;
    state.resultPopup = new maplibregl.Popup({closeButton:true, offset:12}).setLngLat(lngLat).setHTML(html).addTo(map);
    selectCity(null); // also resets searchMatchCodigos, since fromSearch defaults false
    return;
  }
  state.searchMatchCodigos = new Set(hits.map(f=>f.properties.codigo));
  selectCity(hits[0].properties.concello_codigo, {fromSearch:true});
}

// Direct click on a catchment shape on the map -- unlike search, this
// stays a small native popup (1-3 quick facts), matching the template's
// default callout convention for "clicked a thing that's already visible."
function openSchoolPopup(lngLat, feats){
  const t = I18N[lang];
  if(!feats.length) return;
  const html = feats.map(f=>{
    const p = f.properties;
    const tags = parseEnsinanzas(p.ensinanzas).map(e=>`<span class="pop-tag ens-tag-${e.codigo}">${e.nome}</span>`).join("");
    return `<p class="pop-title">${p.nome}</p>
      <p class="pop-sub">${p.concello_nome}</p>
      <div class="pop-tags">${tags}</div>
      <a class="pop-link" href="${p.detail_url}" target="_blank" rel="noopener">${t.officialLink} ↗</a>`;
  }).join("<hr style='border:none;border-top:1px solid var(--hairline);margin:8px 0'>");
  new maplibregl.Popup({closeButton:true, offset:12}).setLngLat(lngLat).setHTML(html).addTo(map);
}
</script>
</body>
</html>
